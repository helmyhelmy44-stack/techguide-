<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كوكب الصور | الإمبراطورية الرقمية</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --dark: #111; --white: #ffffff; }
        body { background: var(--black); color: var(--gold); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 60px; overflow-x: hidden; }
        
        header { background: #000; padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(212,175,55,0.2); position: sticky; top: 0; z-index: 1000; }
        .logo { width: 80px; filter: drop-shadow(0 0 10px var(--gold)); transition: 0.5s; }
        .logo:hover { transform: rotate(360deg); }
        
        .passport-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); margin: 20px auto; width: 85%; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .user-photo { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); float: left; margin-right: 15px; }
        
        .upload-zone { background: rgba(212,175,55,0.05); border: 2px dashed var(--gold); margin: 20px; padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { background: rgba(212,175,55,0.15); }
        
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .img-card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; height: 180px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 10px; box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
        .status-bar { position: fixed; bottom: 0; width: 100%; background: var(--gold); color: #000; text-align: center; padding: 8px; font-weight: bold; z-index: 1001; }
        
        progress { width: 100%; height: 10px; border-radius: 5px; margin-top: 15px; display: none; accent-color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/vz6mD2V/logo.png" alt="Logo" class="logo">
        <h1 style="margin: 10px 0 0; font-size: 1.8rem;">كوكب الصور</h1>
        <p style="color: #888; font-size: 0.8rem; margin: 5px 0;">بإشراف القيصر حلمي وسوسكا</p>
    </header>

    <div class="passport-card">
        <img src="https://i.ibb.co/vz6mD2V/logo.png" class="user-photo">
        <h3 style="margin: 0;">جواز سفر القيادة</h3>
        <p style="margin: 5px 0; font-size: 0.9rem;">الاسم: حلمي حسين</p>
        <p style="margin: 0; color: #fff; font-size: 0.8rem;">الرتبة: مدير الإمبراطورية</p>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <h3 style="margin-top: 0;">📤 مركز رفع البيانات</h3>
        <p style="color: #aaa;">اضغط هنا لرفع صورك إلى الكوكب</p>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <progress id="uploadProgress" value="0" max="100"></progress>
    </div>

    <h3 style="text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin: 30px 20px 10px;">🖼️ الأرشيف الملكي</h3>
    <div id="gallery"></div>

    <div class="status-bar" id="statusLabel">🛡️ بروتوكول سوسكا نشط</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVLuQit8OogUQyVRl9jTtGpNU7P...", 
            authDomain: "helmy44.firebaseapp.com",
            projectId: "helmy44",
            storageBucket: "helmy44.firebasestorage.app",
            messagingSenderId: "567450066040",
            appId: "1:567450066040:web:ae9cad334565897..."
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('uploadProgress');
        const status = document.getElementById('statusLabel');
        const gallery = document.getElementById('gallery');

        // وظيفة الرفع
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
            const uploadTask = uploadBytesResumable(storageRef, file);

            progress.style.display = 'block';

            uploadTask.on('state_changed', 
                (snap) => {
                    const perc = (snap.bytesTransferred / snap.totalBytes) * 100;
                    progress.value = perc;
                    status.innerText = `جاري الإرسال للكوكب: ${Math.round(perc)}%`;
                }, 
                (err) => { status.innerText = "فشل الرفع!"; }, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                        addDoc(collection(db, "images"), {
                            url: url,
                            time: new Date(),
                            by: "القيصر حلمي"
                        });
                        status.innerText = "تمت المهمة بنجاح يا مدير!";
                        progress.style.display = 'none';
                    });
                }
            );
        });

        // عرض الصور لحظياً
        const q = query(collection(db, "images"), orderBy("time", "desc"));
        onSnapshot(q, (snap) => {
            gallery.innerHTML = "";
            snap.forEach((doc) => {
                gallery.innerHTML += `<div class="img-card"><img src="${doc.data().url}" loading="lazy"></div>`;
            });
        });
    </script>
</body>
</html>
